---
run_tasks: true
traveler_debug: true

traveler_version: 14.5.1
traveler_fixpack_version: FP2
traveler_fixpack_install: false

# HCL stopped gzipping the Linux ML installer starting with Traveler 14.5.1: plain .tar, not .tar.gz
traveler_archive_extension: "{{ '.tar' if traveler_version is version('14.5.1', '>=') else '.tar.gz' }}"
traveler_archive: "Traveler_{{ '14.0' if traveler_version == '14.0.0' else traveler_version }}_Linux_ML{{ traveler_archive_extension }}"

traveler_fixpack_archive: "Traveler_{{ traveler_version }}{{ traveler_fixpack_version }}_Linux_ML{{ traveler_archive_extension }}"

installer_url_app_path: "SHI/Traveler"
domino_traveler_port_forwards:
  -
    guest: "{{ domino_install_port_forwards[0].guest }}"
    url: "traveler"
  -
    guest: "{{ domino_install_port_forwards[1].guest }}"
    url: "traveler"
domino_traveler_proxy_url: "{{ domino_traveler_port_forwards[0].url }}.{{ settings.hostname }}.{{ settings.domain }}"

domino_traveler_inet_site_create: true
